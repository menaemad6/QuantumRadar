<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .boxTitle { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .label { font: 14px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <text x="40" y="48" class="title">Quantum Radar Data Flow</text>

  <rect x="40" y="90" width="210" height="120" class="box" />
  <text x="65" y="130" class="boxTitle">Observation</text>
  <text x="65" y="160" class="text">Plate number</text>
  <text x="65" y="182" class="text">Date, car type</text>
  <text x="65" y="204" class="text">Speed, seatbelt</text>

  <rect x="310" y="90" width="210" height="120" class="box" />
  <text x="360" y="130" class="boxTitle">Radar</text>
  <text x="335" y="160" class="text">Sends observation</text>
  <text x="335" y="182" class="text">to all rules</text>
  <text x="335" y="204" class="text">collects violations</text>

  <rect x="580" y="40" width="220" height="130" class="box" />
  <text x="620" y="82" class="boxTitle">TruckSpeedRule</text>
  <text x="610" y="112" class="text">Checks truck speed</text>
  <text x="610" y="134" class="text">Limit: 60 km/h</text>

  <rect x="580" y="195" width="220" height="130" class="box" />
  <text x="605" y="237" class="boxTitle">PrivateCarSpeedRule</text>
  <text x="610" y="267" class="text">Checks private car speed</text>
  <text x="610" y="289" class="text">Limit: 80 km/h</text>

  <rect x="580" y="350" width="220" height="120" class="box" />
  <text x="630" y="392" class="boxTitle">SeatBeltRule</text>
  <text x="610" y="422" class="text">Checks seatbelt status</text>
  <text x="610" y="444" class="text">Must be fastened</text>

  <rect x="875" y="120" width="240" height="120" class="box" />
  <text x="940" y="160" class="boxTitle">Fine</text>
  <text x="900" y="190" class="text">Plate number</text>
  <text x="900" y="212" class="text">Total amount</text>
  <text x="900" y="234" class="text">List of violations</text>

  <rect x="875" y="320" width="240" height="120" class="box" />
  <text x="900" y="360" class="boxTitle">InMemoryFineRepository</text>
  <text x="900" y="390" class="text">Stores fines</text>
  <text x="900" y="412" class="text">Counts violated rules</text>

  <path class="arrow" d="M 250 150 L 310 150" />
  <text x="265" y="135" class="label">scan</text>

  <path class="arrow" d="M 520 145 L 580 105" />
  <path class="arrow" d="M 520 160 L 580 260" />
  <path class="arrow" d="M 520 175 L 580 410" />

  <path class="arrow" d="M 800 105 L 875 165" />
  <path class="arrow" d="M 800 260 L 875 185" />
  <path class="arrow" d="M 800 410 L 875 380" />

  <path class="arrow" d="M 990 240 L 990 320" />
  <text x="1010" y="285" class="label">store</text>
</svg>
